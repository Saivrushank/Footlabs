<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Footlabs | Premium Customizer</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@400;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background: #f5f5f5; font-family: 'Helvetica Neue', 'Roboto', sans-serif; color: #111; }

        /* LOADING SCREEN */
        #loading-screen {
            position: fixed; inset: 0; background: #ffffff; z-index: 3000; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.5s ease-out; pointer-events: none;
        }
        .loader-logo { font-size: 24px; font-weight: 700; letter-spacing: 2px; margin-bottom: 20px; }
        .progress-bar-container { width: 200px; height: 4px; background: #eee; border-radius: 2px; overflow: hidden;}
        #progress-bar { width: 0%; height: 100%; background: #111; transition: width 0.1s; }

        /* MAIN LAYOUT */
        #workspace { display: flex; width: 100vw; height: 100vh; }
        
        #canvas-container { flex: 1; position: relative; background: radial-gradient(circle at center, #ffffff 0%, #e8e8e8 100%); cursor: grab; }
        #canvas-container:active { cursor: grabbing; }

        /* NIKE-STYLE RIGHT PANEL */
        #configurator-panel { 
            width: 400px; background: #ffffff; box-shadow: -5px 0 15px rgba(0,0,0,0.05); 
            display: flex; flex-direction: column; z-index: 100; overflow-y: auto;
        }
        
        .panel-header { padding: 30px; border-bottom: 1px solid #eee; text-align: center; }
        .panel-header h1 { margin: 0; font-size: 22px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
        .panel-header p { margin: 5px 0 0 0; color: #777; font-size: 14px; }

        /* ACCORDION MENU */
        .part-section { border-bottom: 1px solid #eee; }
        
        .part-header { 
            padding: 20px 30px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; 
            font-weight: 700; font-size: 16px; text-transform: uppercase; transition: background 0.2s;
        }
        .part-header:hover { background: #f9f9f9; }
        .part-header.active { background: #111; color: #fff; }
        
        /* HIDDEN OPTIONS MENU */
        .part-options { display: none; padding: 25px 30px; background: #fafafa; }
        .part-options.open { display: block; animation: slideDown 0.3s ease-out; }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .option-label { font-size: 12px; font-weight: 700; color: #111; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 0.5px;}

        /* PREMIUM MATERIAL PILLS */
        .mat-grid { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        .mat-btn { 
            flex: 1; padding: 12px 10px; background: #fff; border: 1px solid #ddd; border-radius: 4px; 
            font-family: inherit; font-size: 12px; font-weight: 500; cursor: pointer; transition: 0.2s; text-align: center;
        }
        .mat-btn:hover { border-color: #111; }
        .mat-btn.selected { border-color: #111; border-width: 2px; padding: 11px 9px; font-weight: 700;}

        /* CURATED CIRCULAR COLOR SWATCHES */
        .color-grid { display: flex; gap: 12px; flex-wrap: wrap; }
        .color-swatch { 
            width: 40px; height: 40px; border-radius: 50%; cursor: pointer; 
            border: 2px solid transparent; box-shadow: 0 2px 5px rgba(0,0,0,0.1); transition: transform 0.1s;
        }
        .color-swatch:hover { transform: scale(1.1); }
        .color-swatch.selected { border: 2px solid #111; transform: scale(1.1); box-shadow: 0 0 0 2px #fff inset; }
        
        /* Specific Swatch Colors */
        .bg-white { background: #ffffff; border: 1px solid #ddd; }
        .bg-black { background: #1a1a1a; }
        .bg-red { background: #c92a2a; }
        .bg-blue { background: #1864ab; }
        .bg-sail { background: #f4f0e6; }
        .bg-volt { background: #d0f91a; }
        .bg-gum { background: #d0b084; }

        .checkout-btn { margin: auto 30px 30px 30px; padding: 18px; background: #111; color: #fff; text-align: center; font-weight: 700; text-transform: uppercase; border-radius: 30px; cursor: pointer; transition: 0.2s; letter-spacing: 1px;}
        .checkout-btn:hover { background: #333; transform: translateY(-2px); }

    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loader-logo">FOOTLABS STUDIO</div>
        <div class="progress-bar-container"><div id="progress-bar"></div></div>
    </div>

    <div id="workspace">
        <div id="canvas-container"></div>
        
        <div id="configurator-panel">
            <div class="panel-header">
                <h1>DESIGN YOUR OWN</h1>
                <p>Template Model 01</p>
            </div>

            <div class="part-section">
                <div class="part-header" onclick="toggleMenu('BODY', this)">
                    1. Upper Material <span class="arrow">+</span>
                </div>
                <div class="part-options" id="menu-BODY">
                    <div class="option-label">Select Material</div>
                    <div class="mat-grid">
                        <button class="mat-btn selected" onclick="applyMaterial('standard', this)">Leather</button>
                        <button class="mat-btn" onclick="applyMaterial('foam', this)">Suede</button>
                        <button class="mat-btn" onclick="applyMaterial('glossy', this)">Patent</button>
                    </div>

                    <div class="option-label">Select Color</div>
                    <div class="color-grid">
                        <div class="color-swatch bg-white" onclick="applyColor('#ffffff', this)"></div>
                        <div class="color-swatch bg-black" onclick="applyColor('#1a1a1a', this)"></div>
                        <div class="color-swatch bg-sail" onclick="applyColor('#f4f0e6', this)"></div>
                        <div class="color-swatch bg-red" onclick="applyColor('#c92a2a', this)"></div>
                        <div class="color-swatch bg-blue" onclick="applyColor('#1864ab', this)"></div>
                    </div>
                </div>
            </div>

            <div class="part-section">
                <div class="part-header" onclick="toggleMenu('SOLE', this)">
                    2. Sole System <span class="arrow">+</span>
                </div>
                <div class="part-options" id="menu-SOLE">
                    <div class="option-label">Select Material</div>
                    <div class="mat-grid">
                        <button class="mat-btn selected" onclick="applyMaterial('standard', this)">Solid Rubber</button>
                        <button class="mat-btn" onclick="applyMaterial('foam', this)">Matte Foam</button>
                    </div>

                    <div class="option-label">Select Color</div>
                    <div class="color-grid">
                        <div class="color-swatch bg-white" onclick="applyColor('#ffffff', this)"></div>
                        <div class="color-swatch bg-black" onclick="applyColor('#1a1a1a', this)"></div>
                        <div class="color-swatch bg-sail" onclick="applyColor('#f4f0e6', this)"></div>
                        <div class="color-swatch bg-gum" onclick="applyColor('#d0b084', this)"></div>
                        <div class="color-swatch bg-volt" onclick="applyColor('#d0f91a', this)"></div>
                    </div>
                </div>
            </div>

            <div class="part-section">
                <div class="part-header" onclick="toggleMenu('LACE', this)">
                    3. Laces <span class="arrow">+</span>
                </div>
                <div class="part-options" id="menu-LACE">
                    <div class="option-label">Select Color</div>
                    <div class="color-grid">
                        <div class="color-swatch bg-white" onclick="applyColor('#ffffff', this)"></div>
                        <div class="color-swatch bg-black" onclick="applyColor('#1a1a1a', this)"></div>
                        <div class="color-swatch bg-red" onclick="applyColor('#c92a2a', this)"></div>
                        <div class="color-swatch bg-volt" onclick="applyColor('#d0f91a', this)"></div>
                    </div>
                </div>
            </div>

            <div style="flex-grow: 1;"></div>
            <div class="checkout-btn">Finish Design</div>
        </div>
    </div>

<script>
let scene, camera, renderer, controls, shoe;
let activePart = null;
let selectableParts = [];
const manager = new THREE.LoadingManager();

// Camera Transition Logic
let isTransitioning = false, transitionProgress = 0;
let startCamPos = new THREE.Vector3(), endCamPos = new THREE.Vector3();
let startTarget = new THREE.Vector3(), endTarget = new THREE.Vector3();

function init3DEnvironment() {
    const container = document.getElementById('canvas-container');
    scene = new THREE.Scene();

    camera = new THREE.PerspectiveCamera(35, container.clientWidth/container.clientHeight, 0.1, 1000);
    camera.position.set(12, 4, 12);

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.outputEncoding = THREE.sRGBEncoding;
    // Premium soft shadows
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    container.appendChild(renderer.domElement);

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.minDistance = 5;
    controls.maxDistance = 20;

    // STUDIO LIGHTING SETUP (Crucial for Retail look)
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(ambientLight);

    const keyLight = new THREE.DirectionalLight(0xffffff, 0.6);
    keyLight.position.set(10, 15, 10);
    keyLight.castShadow = true;
    keyLight.shadow.mapSize.width = 2048;
    keyLight.shadow.mapSize.height = 2048;
    keyLight.shadow.bias = -0.001;
    scene.add(keyLight);

    const fillLight = new THREE.DirectionalLight(0xffffff, 0.4);
    fillLight.position.set(-10, 10, -10);
    scene.add(fillLight);

    // Invisible shadow catcher floor
    const floorGeo = new THREE.PlaneGeometry(100, 100);
    const floorMat = new THREE.ShadowMaterial({ opacity: 0.1 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -1;
    floor.receiveShadow = true;
    scene.add(floor);

    // Loader
    manager.onProgress = (url, itemsLoaded, itemsTotal) => {
        document.getElementById('progress-bar').style.width = Math.floor((itemsLoaded / itemsTotal) * 100) + '%';
    };
    manager.onLoad = () => {
        const loadScreen = document.getElementById('loading-screen');
        loadScreen.style.opacity = '0';
        setTimeout(() => { loadScreen.style.display = 'none'; }, 500);
    };

    // Load Model
    const loader = new THREE.GLTFLoader(manager);
    loader.load('models/updatedshoe.glb', (gltf) => {
        shoe = gltf.scene;
        
        shoe.traverse(node => {
            if(node.isMesh) {
                node.castShadow = true;
                node.receiveShadow = true;
                node.material = new THREE.MeshStandardMaterial({
                    color: node.material.color || 0xffffff,
                    roughness: 0.6,
                    metalness: 0.1,
                    name: node.name + "_mat"
                });
                selectableParts.push(node); 
            }
        });

        const box = new THREE.Box3().setFromObject(shoe);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const scale = 8 / Math.max(size.x, size.y, size.z);
        
        shoe.scale.set(scale, scale, scale);
        shoe.position.sub(center.multiplyScalar(scale));
        shoe.position.y += 0.5;

        scene.add(shoe);
    });

    animate();
}

// --- RETAIL UI LOGIC ---
window.toggleMenu = (partName, headerElement) => {
    // 1. Close all other menus and remove active states
    document.querySelectorAll('.part-options').forEach(menu => menu.classList.remove('open'));
    document.querySelectorAll('.part-header').forEach(header => {
        header.classList.remove('active');
        header.querySelector('.arrow').innerText = '+';
    });

    // 2. Open the clicked menu
    const targetMenu = document.getElementById('menu-' + partName);
    targetMenu.classList.add('open');
    headerElement.classList.add('active');
    headerElement.querySelector('.arrow').innerText = '−';

    // 3. Select the 3D Part
    activePart = selectableParts.find(part => part.name.toUpperCase().includes(partName));

    if(activePart) {
        // Highlight Part Briefly
        const currentEmissive = activePart.material.emissive.getHex();
        activePart.material.emissive.setHex(0x555555);
        setTimeout(() => { activePart.material.emissive.setHex(currentEmissive); }, 200);

        // Move Camera
        triggerCameraFocus(activePart, partName);
    }
};

window.applyColor = (hex, element) => { 
    if(activePart) {
        activePart.material.color.set(hex); 
        
        // Update UI Selected State
        const parent = element.parentElement;
        parent.querySelectorAll('.color-swatch').forEach(sw => sw.classList.remove('selected'));
        element.classList.add('selected');
    }
};

window.applyMaterial = (type, element) => {
    if(!activePart) return;
    
    // Update UI
    const parent = element.parentElement;
    parent.querySelectorAll('.mat-btn').forEach(btn => btn.classList.remove('selected'));
    element.classList.add('selected');

    // Apply Physics
    if (type === 'standard') {
        activePart.material.roughness = 0.6; // Leather-like
        activePart.material.metalness = 0.1;
    } else if (type === 'glossy') {
        activePart.material.roughness = 0.15; // Patent/Gloss
        activePart.material.metalness = 0.4; 
    } else if (type === 'foam') {
        activePart.material.roughness = 0.95; // Suede/Foam
        activePart.material.metalness = 0.0; 
    }
};

// --- CAMERA FOCUS ---
function triggerCameraFocus(part, partName) {
    const box = new THREE.Box3().setFromObject(part);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const distance = Math.max(size.x, size.y, size.z) * 2.5;

    endTarget.copy(center);

    if (partName === 'SOLE') {
        endCamPos.set(center.x + distance, center.y + 1, center.z + distance);
    } else if (partName === 'LACE') {
        endCamPos.set(center.x, center.y + (distance * 1.5), center.z + (distance * 0.8));
    } else {
        endCamPos.set(center.x + distance, center.y + 3, center.z + distance);
    }

    startCamPos.copy(camera.position);
    startTarget.copy(controls.target);
    transitionProgress = 0;
    isTransitioning = true;
}

function animate() {
    requestAnimationFrame(animate);

    if (isTransitioning) {
        transitionProgress += 0.03; 
        if (transitionProgress >= 1) {
            transitionProgress = 1;
            isTransitioning = false;
        }
        const t = transitionProgress * transitionProgress * (3 - 2 * transitionProgress);
        camera.position.lerpVectors(startCamPos, endCamPos, t);
        controls.target.lerpVectors(startTarget, endTarget, t);
    }

    if(controls) controls.update();
    if(renderer && scene && camera) renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    const container = document.getElementById('canvas-container');
    if(!container) return;
    camera.aspect = container.clientWidth / container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
});

// Boot up
window.onload = init3DEnvironment;
</script>
</body>
</html>
