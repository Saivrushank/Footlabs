<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Footlabs | 3D Studio Production</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script>
    
    <style>
        :root { --gold: #e6a822; --bg: #0a0a0a; --panel: #000000; }
        body { margin: 0; overflow: hidden; background: var(--bg); color: #fff; font-family: 'Roboto', sans-serif; }

        /* INTRO SCREEN */
        #onboarding {
            position: fixed; inset: 0; background: var(--bg);
            z-index: 2000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: 0.8s;
        }
        #onboarding.hidden { opacity: 0; pointer-events: none; }
        .logo { font-family: 'Cinzel'; font-size: 50px; letter-spacing: 15px; color: var(--gold); margin-bottom: 30px; }
        
        #load-info { font-size: 10px; letter-spacing: 3px; color: #444; margin-bottom: 20px; }
        #start-btn { 
            display: none; background: transparent; border: 1px solid var(--gold); 
            color: var(--gold); padding: 15px 60px; cursor: pointer; font-family: 'Cinzel';
        }

        /* MAIN STUDIO UI */
        #workspace { width: 100vw; height: 100vh; display: flex; visibility: hidden; }
        #workspace.visible { visibility: visible; }
        
        #canvas-container { flex: 1; position: relative; }
        
        #sidebar { 
            position: absolute; right: 25px; top: 25px; bottom: 25px; 
            width: 320px; background: rgba(0,0,0,0.9); border: 1px solid #222; 
            padding: 30px; z-index: 100; box-sizing: border-box;
        }

        .ui-section { margin-bottom: 30px; }
        .label-tag { font-size: 9px; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; display: block; margin-bottom: 12px; }
        
        #selection-out { font-family: 'Cinzel'; font-size: 18px; color: #fff; margin-bottom: 20px; border-left: 3px solid var(--gold); padding-left: 15px; }
        
        input[type="range"] { width: 100%; accent-color: var(--gold); cursor: pointer; margin-bottom: 15px; }
        input[type="color"] { background: none; border: 1px solid #333; width: 100%; height: 40px; cursor: pointer; }
        
        .hint { font-size: 10px; color: #444; line-height: 1.5; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="onboarding">
        <div class="logo">FOOTLABS</div>
        <div id="load-info">SCANNING MODEL DATA...</div>
        <button id="start-btn" onclick="initializeStudio()">INITIALIZE STUDIO</button>
    </div>

    <div id="workspace">
        <div id="canvas-container"></div>
        <div id="sidebar">
            <div class="ui-section">
                <span class="label-tag">Active Component</span>
                <div id="selection-out">SELECT PART</div>
            </div>
            
            <div class="ui-section">
                <span class="label-tag">Color Configuration</span>
                <input type="color" oninput="applyColor(this.value)">
            </div>

            <div class="ui-section">
                <span class="label-tag">Parametric Scaling</span>
                <div style="font-size:10px; color:#555;">Vertical Thickness</div>
                <input type="range" min="0.2" max="3.0" step="0.1" value="1" oninput="applyScale('y', this.value)">
                
                <div style="font-size:10px; color:#555;">Lateral Width</div>
                <input type="range" min="0.2" max="2.0" step="0.1" value="1" oninput="applyScale('x', this.value)">
            </div>
            
            <div class="hint">
                * Click directly on the 3D model to select a component. 
                Movements will reflect instantly on the highlighted part.
            </div>
        </div>
    </div>

<script>
let scene, camera, renderer, controls, shoe, activePart = null;
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let selectableObjects = [];

// 1. PRE-LOAD MODEL
const loader = new THREE.GLTFLoader();
loader.load('models/shoe.glb', (gltf) => {
    shoe = gltf.scene;
    
    // Scale & Position
    const box = new THREE.Box3().setFromObject(shoe);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const scale = 8 / Math.max(size.x, size.y, size.z);
    
    shoe.scale.set(scale, scale, scale);
    shoe.position.sub(center.multiplyScalar(scale));
    shoe.position.y += 0.5;

    // Build selectable list
    shoe.traverse(c => {
        if(c.isMesh) {
            c.material = c.material.clone();
            selectableObjects.push(c);
        }
    });

    document.getElementById('load-info').style.display = 'none';
    document.getElementById('start-btn').style.display = 'block';
});

function initializeStudio() {
    document.getElementById('onboarding').classList.add('hidden');
    document.getElementById('workspace').classList.add('visible');
    
    const container = document.getElementById('canvas-container');
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a0a);

    camera = new THREE.PerspectiveCamera(40, container.clientWidth/container.clientHeight, 0.1, 1000);
    camera.position.set(12, 6, 12);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.outputEncoding = THREE.sRGBEncoding;
    container.appendChild(renderer.domElement);

    // GRID
    const grid = new THREE.GridHelper(40, 40, 0x222222, 0x111111);
    grid.position.y = -2;
    scene.add(grid);

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 10, 5);
    scene.add(light);

    scene.add(shoe);
    animate();

    // 2. INTERACTION ENGINE (REPAIRED)
    renderer.domElement.addEventListener('pointerdown', (e) => {
        const rect = container.getBoundingClientRect();
        mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
        
        raycaster.setFromCamera(mouse, camera);
        
        // This is the "Deep Scan" fix: checking only the geometry list
        const intersects = raycaster.intersectObjects(selectableObjects, true);
        
        if (intersects.length > 0) {
            activePart = intersects[0].object;
            
            // UI Feedback
            let partName = activePart.name || "Geometry Component";
            document.getElementById('selection-out').innerText = partName.replace(/_/g, ' ').toUpperCase();
            
            // Visual Selection Glow
            if(activePart.material.emissive) {
                activePart.material.emissive.setHex(0x333333);
                setTimeout(() => activePart.material.emissive.setHex(0x000000), 200);
            }
        }
    });
}

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}

// 3. SLIDER ACTIONS
window.applyColor = (c) => { 
    if(activePart) activePart.material.color.set(c); 
    else alert("Please click a part of the shoe first.");
};

window.applyScale = (axis, v) => { 
    if(activePart) activePart.scale[axis] = parseFloat(v); 
};

window.addEventListener('resize', () => {
    const container = document.getElementById('canvas-container');
    if(!container) return;
    camera.aspect = container.clientWidth / container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
});
</script>
</body>
</html>
