<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Footlabs | 3D Engineering Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Roboto:wght@300;400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script>
    
    <style>
        :root { --gold: #e6a822; --bg: #0a0a0a; --panel: #000000; }
        body { margin: 0; overflow: hidden; background: var(--bg); color: #fff; font-family: 'Roboto', sans-serif; }

        #onboarding {
            position: fixed; inset: 0; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; 
            transition: opacity 0.8s, transform 0.8s; overflow-y: auto; padding: 20px;
        }
        #onboarding.hidden { opacity: 0; pointer-events: none; transform: scale(1.05); }
        
        .logo { font-family: 'Cinzel'; font-size: 40px; letter-spacing: 15px; color: var(--gold); margin-bottom: 10px; text-align: center;}
        .subtitle { font-family: 'Share Tech Mono'; font-size: 10px; letter-spacing: 4px; color: #555; margin-bottom: 30px; }
        
        .clinic-panel { display: block; width: 100%; max-width: 600px; animation: fadeIn 0.5s; }
        .mode-panel { display: none; width: 100%; max-width: 800px; text-align: center; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .input-group { display: flex; flex-direction: column; }
        .input-group label { font-size: 10px; color: var(--gold); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
        .input-group select, .input-group input { 
            background: rgba(20,20,20,0.8); border: 1px solid #333; color: #fff; 
            padding: 12px; font-family: 'Roboto'; font-size: 14px; outline: none; transition: 0.3s;
        }
        
        .btn-main { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 15px 40px; cursor: pointer; font-family: 'Cinzel'; letter-spacing: 2px; width: 100%; transition: 0.3s; text-transform: uppercase;}
        .btn-main:hover { background: var(--gold); color: #000; }

        .cards-container { display: flex; gap: 20px; justify-content: center; margin-top: 30px; }
        .mode-card { background: #0a0a0a; border: 1px solid #333; padding: 40px 20px; cursor: pointer; width: 300px; transition: 0.3s; }
        .mode-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .mode-card h3 { font-family: 'Cinzel'; color: var(--gold); }

        #workspace { width: 100vw; height: 100vh; display: flex; visibility: hidden; }
        #workspace.visible { visibility: visible; }
        #canvas-container { flex: 1; position: relative; }
        
        #sidebar { position: absolute; right: 25px; top: 25px; bottom: 25px; width: 340px; background: rgba(0,0,0,0.95); border: 1px solid #222; padding: 30px; z-index: 100; box-sizing: border-box; overflow-y: auto;}
        .ui-section { margin-bottom: 30px; }
        .label-tag { font-size: 9px; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; display: block; margin-bottom: 12px; border-bottom: 1px solid #333; padding-bottom: 5px;}
        #selection-out { font-family: 'Cinzel'; font-size: 18px; color: #fff; margin-bottom: 10px; }
        
        input[type="range"] { width: 100%; accent-color: var(--gold); cursor: pointer; margin-bottom: 15px; }
        input[type="color"] { background: none; border: 1px solid #333; width: 100%; height: 40px; cursor: pointer; }
        #system-status { position: absolute; top: 25px; left: 25px; font-family: 'Share Tech Mono'; font-size: 11px; color: var(--gold); z-index: 5; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="onboarding">
        <div class="logo">FOOTLABS</div>
        <div class="subtitle">BIOMECHANICAL ENGINEERING ENGINE</div>
        
        <div class="clinic-panel" id="step-1">
            <div class="form-grid">
                <div class="input-group"><label>Age</label><input type="number" id="usr-age" value="25"></div>
                <div class="input-group">
                    <label>Gender Profile</label>
                    <select id="usr-gender"><option value="male">Male</option><option value="female">Female</option></select>
                </div>
                <div class="input-group"><label>Foot Size (EU)</label><input type="number" id="usr-size" value="42"></div>
                <div class="input-group">
                    <label>Width Profile</label>
                    <select id="usr-width"><option value="standard">Standard</option><option value="wide">Wide</option></select>
                </div>
            </div>
            <button class="btn-main" onclick="processClinic()">ANALYZE DATA & PROCEED</button>
        </div>

        <div class="mode-panel" id="step-2">
            <h2>SELECT ENGINEERING MODE</h2>
            <div class="cards-container">
                <div class="mode-card" onclick="launchStudio('template')"><h3>TEMPLATE MODE</h3></div>
                <div class="mode-card" onclick="launchStudio('advanced')"><h3>ADVANCED CAD</h3></div>
            </div>
        </div>
    </div>

    <div id="system-status">SYS.MODE: <span id="mode-display">STANDBY</span></div>

    <div id="workspace">
        <div id="canvas-container"></div>
        <div id="sidebar">
            <div class="ui-section">
                <span class="label-tag">Isolated Component</span>
                <div id="selection-out">AWAITING SELECTION</div>
            </div>
            <div class="ui-section">
                <span class="label-tag">Material Properties</span>
                <input type="color" id="color-picker" oninput="applyColor(this.value)">
            </div>
            <div class="ui-section">
                <span class="label-tag">Parametric Extrusion</span>
                <input type="range" id="scale-y" min="0.5" max="3.0" step="0.01" value="1" oninput="applyScale('y', this.value)">
                <input type="range" id="scale-x" min="0.5" max="2.0" step="0.01" value="1" oninput="applyScale('x', this.value)">
            </div>
        </div>
    </div>

<script>
let scene, camera, renderer, controls, shoe, activePart = null;
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let selectableParts = [];

// 1. LOAD THE UPDATED MODEL
const loader = new THREE.GLTFLoader();
loader.load('models/updatedshoe.glb', (gltf) => {
    shoe = gltf.scene;
    
    // Traversal to prepare the 112 parts
    shoe.traverse(node => {
        if(node.isMesh) {
            // Give each part its own independent material instance immediately
            node.material = node.material.clone();
            selectableParts.push(node); 
        }
    });

    const box = new THREE.Box3().setFromObject(shoe);
    const size = box.getSize(new THREE.Vector3());
    const scale = 8 / Math.max(size.x, size.y, size.z);
    shoe.scale.set(scale, scale, scale);
    console.log("Modular Engineering File Loaded.");
});

function processClinic() {
    document.getElementById('step-1').style.display = 'none';
    document.getElementById('step-2').style.display = 'block';
}

function launchStudio(mode) {
    document.getElementById('mode-display').innerText = mode.toUpperCase();
    document.getElementById('onboarding').classList.add('hidden');
    document.getElementById('workspace').classList.add('visible');
    init3DEnvironment();
}

function init3DEnvironment() {
    const container = document.getElementById('canvas-container');
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a0a);

    camera = new THREE.PerspectiveCamera(45, container.clientWidth/container.clientHeight, 0.1, 1000);
    camera.position.set(10, 5, 10);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.outputEncoding = THREE.sRGBEncoding;
    container.appendChild(renderer.domElement);

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 10, 7.5);
    scene.add(light);

    if(shoe) scene.add(shoe);
    animate();

    renderer.domElement.addEventListener('pointerdown', (e) => {
        const rect = container.getBoundingClientRect();
        mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
        
        raycaster.setFromCamera(mouse, camera);
        const hits = raycaster.intersectObjects(selectableParts, true);
        
        if (hits.length > 0) {
            activePart = hits[0].object;
            // Update UI with the part name
            document.getElementById('selection-out').innerText = activePart.name.replace(/_/g, ' ').toUpperCase();
            // Sync Sliders to the part's current scale
            document.getElementById('scale-y').value = activePart.scale.y;
            document.getElementById('scale-x').value = activePart.scale.x;
        }
    });
}

function animate() {
    requestAnimationFrame(animate);
    if(controls) controls.update();
    renderer.render(scene, camera);
}

window.applyColor = (hex) => { 
    if(activePart) activePart.material.color.set(hex); 
};

window.applyScale = (axis, value) => { 
    if(activePart) activePart.scale[axis] = parseFloat(value); 
};

window.addEventListener('resize', () => {
    const container = document.getElementById('canvas-container');
    camera.aspect = container.clientWidth / container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
});
</script>
</body>
</html>
